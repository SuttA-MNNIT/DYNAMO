# configs/default.yaml
# =====================================================================
# Default hyperparameters for all DTN experiments.
# Override any value via CLI flags or by passing a custom config path.
# =====================================================================

seed: 42
output_dir: "./results"

# ── Experiment control ────────────────────────────────────────────────
experiments:
  split_mnist:
    enabled: true
    epochs_per_task: 12
  seq_cifar100:
    enabled: true
    n_tasks: 10
    epochs_per_task: 10
  ablations:
    enabled: true
    epochs_per_task: 10

# ── DTN — Split-MNIST ─────────────────────────────────────────────────
dtn_mnist:
  input_size: 784
  hidden_sizes: [64, 32]
  n_classes_per_task: 2
  sparsity: 0.95
  lam: 1.0e-4        # basal metabolic cost  λ
  alpha: 0.9         # Fisher / heat EMA     α
  beta: 1.0          # nutrient absorption   β
  h_crit: 0.85       # mitosis heat threshold
  max_w: 256         # max neurons per layer
  cap_mitosis: 6     # max new neurons per step
  lr: 0.01
  batch_size: 128

# ── DTN — Sequential CIFAR-100 ────────────────────────────────────────
dtn_cifar:
  feat_dim: 768              # ViT-B/16 output dim
  hidden_sizes: [512, 256]
  sparsity: 0.50
  lam: 1.0e-4
  alpha: 0.9
  beta: 2.0
  h_crit: 0.30
  max_w: 1024
  cap_mitosis: 16
  lr: 0.05
  batch_size: 64

# ── Baselines ─────────────────────────────────────────────────────────
dense_mnist:
  hidden_sizes: [128, 64]
  lr: 0.01

ewc_mnist:
  hidden_sizes: [128, 64]
  lr: 0.01
  lam: 5000
  n_fisher_samples: 400

pnn_mnist:
  hidden: 64
  lr: 0.01

ewc_cifar:
  hidden_sizes: [512, 256]
  lr: 0.01
  lam: 1000
  n_fisher_samples: 200

# ── Ablation sweeps ───────────────────────────────────────────────────
ablation:
  lambdas:   [1.0e-6, 1.0e-5, 1.0e-4, 1.0e-3, 1.0e-2]
  h_crits:   [0.3, 0.5, 0.7, 0.85, 0.95, 1.5]
  sparsities: [0.50, 0.70, 0.80, 0.90, 0.95, 0.98]
